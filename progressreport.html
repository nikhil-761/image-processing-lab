    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  ></script>
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"
    integrity="sha512-qZvrmS2ekKPF2mSznTQsxqPgnpkI4DNTlrdUmTzrDgektczlKNRRhy5X5AAOnx5S09ydFYWWNSfcEqDTTHgtNA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  ></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #111827;
      line-height: 1.6;
      font-kerning: normal;
      text-rendering: optimizeLegibility;
    }

    .vl-header {
      min-height: 70px;
      background: #ffffff;
      border-bottom: 1px solid #d1d5db;
      box-shadow: none;
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
    }
    .top-nav { gap: 1.5rem; align-items: center; }
    .nav-link {
      position: relative;
      color: #1f2937;
      font-weight: 500;
      padding: 0.5rem 1rem;
      transition: background-color 150ms ease;
      border-radius: 0.375rem;
      text-decoration: none;
    }
    .nav-link:hover,.nav-link:focus {

      background: #f3f4f6;
    }
    .nav-link::after { display: none; }

    .logo-container { display:flex; align-items:center; gap:.75rem; }

      color: #4b5563;
      padding: 0.75rem 0;

      z-index: 1;
      position: static;
      height: auto;
    }
    .footer-inner { max-width:1200px; margin:0 auto; text-align:center; padding:0 1.5rem; }

    /* Embedded (inside iframe) -> hide header/footer */
    .embedded .vl-header, .embedded .vl-footer { display:none !important; }
    .embedded #report-container { padding-top: 1.5rem !important; padding-bottom: 1.5rem !important; }

    #report-container {
      max-width: 960px !important;
      padding-top: 2rem !important;
      padding-bottom: 2rem !important;
    }
    #content {
      display: flex;
      flex-direction: column;
      gap: 1rem !important;
    }

 
    #downloadBtn {
      border-radius: 4px !important;
      font-weight: 600 !important;
      box-shadow: none !important;
      font-size: 14px !important;
      line-height: 1.2 !important;
      padding: 0.5rem 0.9rem !important;
    }
 
    #downloadBtn {
      background: #1f2937 !important;
      color: #ffffff !important;
      border: 1px solid #1f2937 !important;
    }
    
    #downloadBtn:hover { background: #111827 !important; }

    .report-section {
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      padding: 16px;
    }
    .report-section,
    .report-section * {
      letter-spacing: normal;
      word-spacing: normal;
    }
    .report-section-title {
      font-size: 18px;
      line-height: 1.3;
      font-weight: 600;
      margin: 0 0 10px;
      color: #111827;
    }
    .report-section p,
    .report-muted,
    .report-cell-muted,
    .report-details-grid,
    .report-table td {
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      line-height: 1.65;
      letter-spacing: normal;
      word-spacing: normal;
      text-align: left;
    }
    .report-grid-two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .report-details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 16px;
      font-size: 14px;
      color: #1f2937;
    }
    .report-label {
      font-weight: 600;
      color: #111827;
      margin-right: 4px;
    }
    .report-duration {
      font-size: 28px;

      margin-bottom: 10px;

      background: #f3f4f6;
      border: 1px solid #d1d5db;
      border-radius: 999px;
      padding: 2px 10px;
      font-weight: 500;

    .report-table-wrap {
      overflow: auto;
      border: 1px solid #d1d5db;

      font-size: 14px;

    .report-table th,

      color: #111827;

    }

      color: #4b5563;
    }

      color: #4b5563;
      margin: 0 0 8px;
    }
    .report-frame-wrap {
      margin-top: 8px;
      border: 1px solid #d1d5db;
      border-radius: 4px;

      background: #ffffff;

      box-shadow: none !important;

    @media (max-width: 768px) {
      .report-grid-two,

    /* Minimal fallback modal styling (if alert-theme.css missing) */
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:99999; padding:16px; }
    .modal.show { display:flex; align-items:center; justify-content:center; }
    .modal-box {

    .modal-close-btn {

      background: #0f172a;

    }
    .modal-secondary-btn { background:#fff; color:#0f172a; }
    .is-modal-open { overflow:hidden; }

    @media print {
      header, footer, #downloadBtn { display:none !important; }

      body.print-with-snapshot #reportSimulationSection #simulationReportFrame { display: none !important; }
      body.print-with-snapshot #reportSimulationSection .simulation-print-snapshot { display: block !important; }
    }
  </style>

  <script>
  (() => {
    const reportAlertModal = document.getElementById("reportAlertModal");
    const reportAlertTitle = document.getElementById("reportAlertTitle");
    const reportAlertMessage = document.getElementById("reportAlertMessage");
    const reportAlertClose = reportAlertModal?.querySelector("[data-report-alert-close]");
    const reportAlertActions = reportAlertModal?.querySelector("[data-report-alert-actions]");
    const reportAlertYes = reportAlertModal?.querySelector("[data-report-alert-yes]");
    const reportAlertNo = reportAlertModal?.querySelector("[data-report-alert-no]");

    let reportAlertOnClose = null;
    let reportAlertOnYes = null;
    let reportAlertOnNo = null;
    let reportAlertMode = "alert";

    const reportContainer = document.getElementById("report-container");
    const reportLockedNotice = document.getElementById("reportLockedNotice");
    const reportLockedCTA = document.getElementById("reportLockedCTA");
    const contentEl = document.getElementById("content");
    let currentSimulationReport = null;
    let simulationPrintSnapshotEl = null;
    let printFrameOriginalHeight = null;
    let printFrameOriginalMinHeight = null;
    let printInProgress = false;

    function setReportContainerVisible(visible) {
      if (!reportContainer) return;
      reportContainer.style.display = visible ? "" : "none";
      scheduleEmbeddedHeightSync();
    }

    function setReportLockedVisible(visible) {
      if (!reportLockedNotice) return;
      reportLockedNotice.classList.toggle("hidden", !visible);
      if (visible) {
        reportLockedNotice.scrollIntoView({ behavior: "smooth" });
        if (reportContainer) reportContainer.style.display = "none";
      }
      scheduleEmbeddedHeightSync();
    }

    function getVisibleElementHeight(el) {
      if (!el || el.classList?.contains("hidden")) return 0;
      return Math.max(
        el.scrollHeight || 0,
        el.offsetHeight || 0,
        Math.ceil(el.getBoundingClientRect?.().height || 0)
      );
    }

    function getProgressReportHeight() {
      const reportContentHeight = getVisibleElementHeight(contentEl);
      const reportContainerHeight = getVisibleElementHeight(reportContainer);
      const lockedNoticeHeight = getVisibleElementHeight(reportLockedNotice);

      return Math.max(
        reportContentHeight,
        reportContainerHeight,
        lockedNoticeHeight,
        640
      );
    }

    function notifyParentOfHeight() {
      if (window.parent === window) return;
      const height = Math.max(640, Math.ceil(getProgressReportHeight()) + 8);
      if (window.__vlabLastReportedProgressHeight === height) return;
      window.__vlabLastReportedProgressHeight = height;
      try {
        window.parent.postMessage({ type: "vlab:progress_report_height", height }, "*");
      } catch (error) {}
    }

    function scheduleEmbeddedHeightSync() {
      if (window.parent === window) return;
      if (window.__vlabProgressHeightSyncQueued) return;
      window.__vlabProgressHeightSyncQueued = true;

      window.requestAnimationFrame(() => {
        window.__vlabProgressHeightSyncQueued = false;
        notifyParentOfHeight();
        window.clearTimeout(window.__vlabProgressHeightLateTimer);
        window.__vlabProgressHeightLateTimer = window.setTimeout(notifyParentOfHeight, 180);
      });
    }

    function cleanupSimulationFrameAutoResize(iframe) {
      if (!iframe) return;
      try { iframe.__vlabFrameResizeObserver?.disconnect?.(); } catch {}
      try { iframe.__vlabFrameMutationObserver?.disconnect?.(); } catch {}
      try { iframe.__vlabFrameWindow?.removeEventListener?.("resize", iframe.__vlabFrameResizeHandler); } catch {}
      iframe.__vlabFrameResizeObserver = null;
      iframe.__vlabFrameMutationObserver = null;
      iframe.__vlabFrameWindow = null;
      iframe.__vlabFrameResizeHandler = null;
    }

    function ensureReadableSimulationReportTypography(doc) {
      if (!doc) return;

      let head = doc.head;
      if (!head) {
        head = doc.createElement("head");
        if (doc.documentElement.firstChild) {
          doc.documentElement.insertBefore(head, doc.documentElement.firstChild);
        } else {
          doc.documentElement.appendChild(head);
        }
      }

      if (!head.querySelector('link[data-vlab-fonts="inter"]')) {
        const link = doc.createElement("link");
        link.rel = "stylesheet";
        link.href = "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap";
        link.setAttribute("data-vlab-fonts", "inter");
        head.appendChild(link);
      }

      let styleEl = doc.getElementById("vlab-readable-typography");
      if (!styleEl) {
        styleEl = doc.createElement("style");
        styleEl.id = "vlab-readable-typography";
        head.appendChild(styleEl);
      }

      styleEl.textContent = `
        html, body, #report-root {
          font-family: 'Inter', 'Segoe UI', Arial, sans-serif !important;
          line-height: 1.65 !important;
          font-kerning: normal !important;
          text-rendering: optimizeLegibility !important;
        }
        p, li, td, th, .section, .results-card, .info-card, .report-stamp, .badge, .report-subtitle {
          font-family: 'Inter', 'Segoe UI', Arial, sans-serif !important;
          letter-spacing: normal !important;
          word-spacing: normal !important;
          font-kerning: normal !important;
        }
        p {
          line-height: 1.68 !important;
          text-align: left !important;
          word-break: normal !important;
          overflow-wrap: break-word !important;
          white-space: normal !important;
        }
        p[style*="text-align:justify"],
        p[style*="text-align: justify"] {
          text-align: left !important;
        }
      `;
    }

    async function waitForDocumentFonts(doc, timeoutMs = 2500) {
      if (!doc?.fonts || typeof doc.fonts.ready?.then !== "function") return;

      try {
        await Promise.race([
          doc.fonts.ready,
          new Promise((resolve) => setTimeout(resolve, timeoutMs))
        ]);
      } catch {}
    }

    function getIframeContentHeight(doc) {
      const reportRoot = doc?.getElementById("report-root") || doc?.body || doc?.documentElement;
      if (!reportRoot) return 0;

      const rootRect = reportRoot.getBoundingClientRect?.() || { top: 0, height: 0 };
      const children = Array.from(reportRoot.children || []);

      if (!children.length) {
        return Math.max(
          Math.ceil(rootRect.height || 0),
          reportRoot.scrollHeight || 0,
          reportRoot.offsetHeight || 0
        );
      }

      let maxBottom = 0;
      children.forEach((child) => {
        const rect = child.getBoundingClientRect?.();
        if (!rect) return;

        let marginBottom = 0;
        try {
          marginBottom = parseFloat(doc.defaultView?.getComputedStyle(child)?.marginBottom || "0") || 0;
        } catch {}

        maxBottom = Math.max(maxBottom, rect.bottom - rootRect.top + marginBottom);
      });

      let paddingBottom = 0;
      try {
        paddingBottom = parseFloat(doc.defaultView?.getComputedStyle(reportRoot)?.paddingBottom || "0") || 0;
      } catch {}

      return Math.max(0, Math.ceil(maxBottom + paddingBottom));
    }

    function syncSimulationReportFrameHeight(iframe) {
      if (!iframe || iframe.classList.contains("hidden")) return;

      let doc = null;
      try {
        doc = iframe.contentDocument;
      } catch (error) {
        return;
      }
      if (!doc) return;

      try {
        if (doc.documentElement) doc.documentElement.style.overflow = "hidden";
        if (doc.body) doc.body.style.overflow = "hidden";
      } catch (error) {}

      iframe.setAttribute("scrolling", "no");
      iframe.style.overflow = "hidden";

      const nextHeight = Math.max(
        540,
        getIframeContentHeight(doc)
      );

      const currentHeight = parseFloat(iframe.style.height) || 0;
      if (Math.abs(currentHeight - nextHeight) > 1) {
        iframe.style.height = `${nextHeight}px`;
        iframe.style.minHeight = `${nextHeight}px`;
        scheduleEmbeddedHeightSync();
      }
    }

    function attachSimulationFrameAutoResize(iframe) {
      if (!iframe) return;
      cleanupSimulationFrameAutoResize(iframe);

      const setup = () => {
        let doc = null;
        try {
          doc = iframe.contentDocument;
        } catch (error) {
          return;
        }
        if (!doc) return;

        ensureReadableSimulationReportTypography(doc);
        syncSimulationReportFrameHeight(iframe);

        const resizeHandler = () => syncSimulationReportFrameHeight(iframe);
        iframe.__vlabFrameResizeHandler = resizeHandler;

        if (typeof ResizeObserver === "function") {
          const resizeObserver = new ResizeObserver(resizeHandler);
          if (doc.documentElement) resizeObserver.observe(doc.documentElement);
          if (doc.body && doc.body !== doc.documentElement) resizeObserver.observe(doc.body);
          iframe.__vlabFrameResizeObserver = resizeObserver;
        }

        if (typeof MutationObserver === "function") {
          const mutationObserver = new MutationObserver(resizeHandler);
          const mutationTarget = doc.body || doc.documentElement;
          if (mutationTarget) {
            mutationObserver.observe(mutationTarget, {
              childList: true,
              subtree: true,
              characterData: true
            });
            iframe.__vlabFrameMutationObserver = mutationObserver;
          }
        }

        try {
          iframe.__vlabFrameWindow = doc.defaultView || null;
          iframe.__vlabFrameWindow?.addEventListener?.("resize", resizeHandler);
        } catch (error) {}

        waitForDocumentFonts(doc).then(resizeHandler);
        window.setTimeout(resizeHandler, 80);
        window.setTimeout(resizeHandler, 400);
        window.setTimeout(resizeHandler, 1200);
      };

      iframe.addEventListener("load", setup, { once: true });
    }

    function showReportAlert(message, title = "Alert", options = {}) {
      const opts = typeof options === "function" ? { onClose: options } : (options || {});
      if (!reportAlertModal) {
        alert(message);
        if (typeof opts.onClose === "function") opts.onClose();
        return;
      }
      reportAlertTitle.textContent = title;
      reportAlertMessage.textContent = message;

      reportAlertOnClose = typeof opts.onClose === "function" ? opts.onClose : null;
      reportAlertOnYes = typeof opts.onYes === "function" ? opts.onYes : null;
      reportAlertOnNo = typeof opts.onNo === "function" ? opts.onNo : null;

      if (reportAlertActions) reportAlertActions.hidden = reportAlertMode !== "confirm";
      if (reportAlertClose) reportAlertClose.classList.toggle("hidden", reportAlertMode === "confirm");

      reportAlertModal.classList.add("show");
      document.body.classList.add("is-modal-open");

      setTimeout(() => {
        if (reportAlertMode === "confirm") reportAlertYes?.focus?.();
        else reportAlertClose?.focus?.();

    function closeReportAlert(action = "close") {
      if (!reportAlertModal) return;
      reportAlertModal.classList.remove("show");
      document.body.classList.remove("is-modal-open");

      const mode = reportAlertMode;
      const onClose = reportAlertOnClose;
      const onYes = reportAlertOnYes;
      const onNo = reportAlertOnNo;

      reportAlertOnClose = null;
      reportAlertOnYes = null;
      reportAlertOnNo = null;
      reportAlertMode = "alert";

      if (mode === "confirm") {
        if (action === "yes" && onYes) onYes();
        if (action === "no" && onNo) onNo();
      } else {
        if (onClose) onClose();
      }
    }

    function formatTimestamp(value) {
      if (!value) return null;
      const n = Number(value);
      const d = Number.isFinite(n) ? new Date(n) : new Date(value);
      if (Number.isNaN(d.getTime())) return null;
      return d.toLocaleDateString("en-US", {
        month: "long",
        day: "numeric",
        year: "numeric"
      });
    }

    function formatTimelineDateTime(value) {
      if (!value) return null;
      const n = Number(value);
      const d = Number.isFinite(n) ? new Date(n) : new Date(value);
      if (Number.isNaN(d.getTime())) return null;
      const datePart = d.toLocaleDateString("en-US", {
        month: "long",
        day: "numeric",
        year: "numeric"
      });
      const timePart = d.toLocaleTimeString("en-US", {
        hour: "numeric",
        minute: "2-digit",
        second: "2-digit",
        hour12: true
      });
      return `${datePart}, ${timePart}`;
    }

    function decodeHtmlEntities(value) {
      const txt = document.createElement("textarea");
      txt.innerHTML = String(value || "");
      return txt.value;
    }

    function parseSimulationTimingFromHtml(html) {
      if (!html || typeof html !== "string") {
        return { startText: null, endText: null, durationText: null };
      }

      function extract(label) {
        const escaped = label.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        const match = html.match(new RegExp(`<span class="label">${escaped}:<\\/span><br>\\s*([^<]+)`, "i"));
        return match && match[1] ? decodeHtmlEntities(match[1].trim()) : null;
      }

      return {
        startText: extract("Start Time"),
        endText: extract("End Time"),
        durationText: extract("Total Time Spent")
      };
    }

    function parseDurationTextToMs(value) {
      const text = String(value || "").trim().toLowerCase();
      if (!text) return 0;

      let totalMs = 0;
      const hourMatch = text.match(/(\d+)\s*(hr|hrs|hour|hours)/);
      const minuteMatch = text.match(/(\d+)\s*(min|mins|minute|minutes)/);
      const secondMatch = text.match(/(\d+)\s*(sec|secs|second|seconds)/);

      if (hourMatch) totalMs += Number(hourMatch[1]) * 60 * 60 * 1000;
      if (minuteMatch) totalMs += Number(minuteMatch[1]) * 60 * 1000;
      if (secondMatch) totalMs += Number(secondMatch[1]) * 1000;

      return Number.isFinite(totalMs) ? totalMs : 0;
    }

    function getSimulationTimingData(simReport, timestamps) {
      const parsed = parseSimulationTimingFromHtml(simReport?.html);
      const simulationStart = timestamps?.simulationStart || null;
      const simulationEnd = timestamps?.simulationEnd || null;

      const simulationMs =
        simulationStart && simulationEnd
          ? Math.max(0, new Date(simulationEnd).getTime() - new Date(simulationStart).getTime())
          : null;

      return {
        startDisplay: formatTimelineDateTime(simulationStart) || parsed.startText || "-",
        endDisplay:
          formatTimelineDateTime(simulationEnd) ||
          parsed.endText ||
          formatTimelineDateTime(simReport?.updatedAt) ||
          "-",
        durationMs:
          (simulationMs !== null ? simulationMs : null) ??
          parseDurationTextToMs(parsed.durationText),
        durationDisplay:
          (simulationMs !== null ? VLProgress.formatMs(simulationMs) : null) ||
          parsed.durationText ||
          "-"
      };
    }

    function normalizeSimulationReportHtml(html) {
      if (!html || typeof html !== "string") return html;

      return html
        .replace(/(<\/(?:span|strong|b|em)>)(?=[A-Za-z0-9])/g, "$1 ")
        .replace(/text-align\s*:\s*justify\s*;?/gi, "text-align:left;")
        .replace(
          /<p><span class="label">Experiment Title:<\/span>\s*To study the Load Characteristics of DC shunt generator<\/p>/g,
          '<p><span class="label">Experiment Title:</span> To Study the Load Characteristics of a DC Shunt Generator</p>'
        )
        .replace(
          /<p style="text-align:left;">To study the external characteristic of a DC shunt generator by varying the lamp load, measuring the terminal voltage and load current, and plotting the terminal voltage versus load current [^<]* curve\.<\/p>/g,
          '<p style="text-align:left;">To study the load characteristics of a DC shunt generator by varying the lamp load, measuring terminal voltage and load current, and plotting the V-I characteristic curve.</p>'
        )
        .replace(
          /<p style="text-align:left;">Connections were completed as instructed, supply was switched ON, lamp load was varied, and the corresponding load current and terminal voltage readings were recorded, and a graph was generated between terminal voltage and load current\.<\/p>/g,
          '<p style="text-align:left;">The circuit connections were completed as per the procedure. The supply was switched on, the lamp load was varied step by step, the corresponding load current and terminal voltage readings were recorded, and the load characteristic graph was plotted.</p>'
        )
        .replace(
          /<h3>Components and key Parameters<\/h3>/g,
          '<h3>Components and Key Parameters</h3>'
        )
        .replace(
          /<li>3-Point Starter: 220V DC, 7\.5 HP<\/li>/g,
          '<li>3-Point Starter: 220 V DC, 7.5 HP</li>'
        )
        .replace(
          /<li>Bulbs: 10 [^<]* 200 W each<\/li>/g,
          '<li>Bulbs: 10 x 200 W each</li>'
        );
    }

    function getSimulationReportData() {
      try {
        const activeHash = localStorage.getItem("vlab_exp2_active_user_hash");
        const keys = [];
        if (activeHash) keys.push(`vlab_exp2_user_${activeHash}_simulation_report_html`);
        keys.push("vlab_exp2_simulation_report_html");

        for (const key of keys) {
          const html = localStorage.getItem(key);
          if (html && html.trim()) {
            const updatedAt = localStorage.getItem(key.replace("_html", "_updated_at"));
            return { html: normalizeSimulationReportHtml(html), updatedAt };

      } catch {}

      try {
        const PREFIX = "VLAB_EXP2::";
        if (typeof window.name === "string" && window.name.startsWith(PREFIX)) {
          const data = JSON.parse(window.name.slice(PREFIX.length)) || {};
          const html = (data["vlab_exp2_simulation_report_html"] || "").toString();
          if (html && html.trim()) {
            return {
              html: normalizeSimulationReportHtml(html),
              updatedAt: data["vlab_exp2_simulation_report_updated_at"] || null
            };
          }
        }
      } catch {}

      return null;

    async function captureSimulationGroupCanvas(reportDoc, nodes, scale) {
      if (!reportDoc || !Array.isArray(nodes) || !nodes.length) return null;
      if (typeof html2canvas !== "function") return null;

       ensureReadableSimulationReportTypography(reportDoc);

      const host = reportDoc.createElement("div");

      host.style.left = "-100000px";
      host.style.top = "0";
      host.style.width = "1040px";
      host.style.margin = "0";
      host.style.padding = "0";
      host.style.pointerEvents = "none";
      host.style.zIndex = "-1";

      const page = reportDoc.createElement("div");
      page.style.maxWidth = "960px";
      page.style.margin = "0 auto";
      page.style.padding = "32px";
      page.style.background = "#ffffff";
      page.style.border = "1px solid #e5e9f2";
      page.style.borderRadius = "16px";
      page.style.boxShadow = "0 10px 30px rgba(31, 45, 61, 0.12)";
      page.style.boxSizing = "border-box";

      nodes.forEach((node) => {
        if (node) page.appendChild(node.cloneNode(true));
      });

      host.appendChild(page);
      reportDoc.body.appendChild(host);

      try {
        await waitForDocumentFonts(reportDoc);
        await sleep(80);
        return await html2canvas(page, {
          scale,
          useCORS: true,
          allowTaint: true,
          scrollX: 0,
          scrollY: 0,
          backgroundColor: "#ffffff"
        });
      } finally {
        host.remove();
      }
    }

    async function captureSimulationExportCanvases(frameEl, scale) {
      if (!frameEl || frameEl.classList.contains("hidden")) return [];

      await waitForIframeReady(frameEl, 6000);
      await sleep(180);

      const reportDoc = frameEl.contentDocument;
      const reportRoot = reportDoc?.getElementById("report-root") || reportDoc?.body;
      if (!reportDoc || !reportRoot) return [];

      ensureReadableSimulationReportTypography(reportDoc);
      await waitForDocumentFonts(reportDoc);

      const reportPages = Array.from(reportRoot.querySelectorAll(".report-page"));
      if (reportPages.length) {
        const pageCanvases = [];
        for (const reportPage of reportPages) {
          const canvas = await captureSimulationGroupCanvas(reportDoc, [reportPage], scale);
          if (canvas) pageCanvases.push(canvas);
        }
        return pageCanvases;
      }

      const header = reportRoot.querySelector(".header-row");
      const sections = Array.from(reportRoot.querySelectorAll(".section"));
      const groups = [];

      const introGroup = [];
      if (header) introGroup.push(header);
      if (sections[0]) introGroup.push(sections[0]);
      if (sections[1]) introGroup.push(sections[1]);
      if (introGroup.length) groups.push(introGroup);

      const observationAndGraphGroup = [];
      if (sections[2]) observationAndGraphGroup.push(sections[2]);
      if (sections[3]) observationAndGraphGroup.push(sections[3]);
      if (observationAndGraphGroup.length) groups.push(observationAndGraphGroup);

      for (let i = 4; i < sections.length; i++) {
        groups.push([sections[i]]);
      }

      const canvases = [];
      for (const group of groups) {
        const canvas = await captureSimulationGroupCanvas(reportDoc, group, scale);
        if (canvas) canvases.push(canvas);
      }

      return canvases;
    }

    function sleep(ms = 0) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function waitForIframeReady(frameEl, timeoutMs = 4500) {
      return new Promise((resolve) => {
        if (!frameEl) return resolve();
        let done = false;
        const finish = () => {
          if (done) return;
          done = true;
          resolve();
        };

        try {
          const doc = frameEl.contentDocument;
          if (doc && doc.readyState === "complete") {
            finish();
            return;
          }
        } catch {}

        const timer = setTimeout(finish, timeoutMs);
        frameEl.addEventListener(
          "load",
          () => {
            clearTimeout(timer);
            finish();
          },
          { once: true }
        );
      });
    }

    function addCanvasFittedSinglePage(pdf, canvas, margin = 24) {
      if (!pdf || !canvas || !canvas.width || !canvas.height) return;
      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();
      const usableWidth = pageWidth - margin * 2;
      const usableHeight = pageHeight - margin * 2;
      const scale = Math.min(usableWidth / canvas.width, usableHeight / canvas.height);
      const renderWidth = canvas.width * scale;
      const renderHeight = canvas.height * scale;
      const x = margin + (usableWidth - renderWidth) / 2;
      const y = margin;
      pdf.addImage(canvas.toDataURL("image/png"), "PNG", x, y, renderWidth, renderHeight, undefined, "FAST");
    }

    function appendCanvasPaged(pdf, canvas, { margin = 24, startNewPage = true } = {}) {
      if (!pdf || !canvas || !canvas.width || !canvas.height) return;
      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();
      const usableWidth = pageWidth - margin * 2;
      const usableHeight = pageHeight - margin * 2;
      const sliceSourceHeight = Math.max(1, Math.floor((usableHeight * canvas.width) / usableWidth));

      let sourceY = 0;
      let pageIndex = 0;
      let newPage = startNewPage;

      while (sourceY < canvas.height) {
        if (newPage || pageIndex > 0) pdf.addPage();

        const thisSliceHeight = Math.min(sliceSourceHeight, canvas.height - sourceY);
        const sliceCanvas = document.createElement("canvas");
        sliceCanvas.width = canvas.width;
        sliceCanvas.height = thisSliceHeight;

        const ctx = sliceCanvas.getContext("2d");
        if (!ctx) throw new Error("Unable to prepare PDF page slice.");
        ctx.drawImage(
          canvas,
          0, sourceY, canvas.width, thisSliceHeight,
          0, 0, canvas.width, thisSliceHeight
        );

        const renderHeight = (thisSliceHeight * usableWidth) / canvas.width;
        pdf.addImage(
          sliceCanvas.toDataURL("image/png"),
          "PNG",
          margin,
          margin,
          usableWidth,
          renderHeight,
          undefined,
          "FAST"
        );

        sourceY += thisSliceHeight;
        pageIndex += 1;
        newPage = false;
      }
    }

    async function prepareExportNodes() {
      const sourceNode = reportContainer || contentEl;
      if (!sourceNode) return null;

      const width = sourceNode.offsetWidth || sourceNode.clientWidth || 900;
      const wrappers = [];
      const appendWrapper = (wrapper) => {
        document.body.appendChild(wrapper);
        wrappers.push(wrapper);
      };

      const firstPageWrapper = createDetachedExportWrapper(width);
      const firstPageClone = sourceNode.cloneNode(true);
      firstPageClone.style.width = "100%";
      firstPageClone.style.maxWidth = "none";
      const firstPageActions = firstPageClone.querySelector("#downloadBtn")?.parentElement;
      if (firstPageActions) firstPageActions.remove();
      firstPageClone.querySelector("#reportSimulationSection")?.remove();
      firstPageWrapper.appendChild(firstPageClone);
      appendWrapper(firstPageWrapper);

      const liveFrame = document.getElementById("simulationReportFrame");
      const simulationCanvases = await captureSimulationExportCanvases(liveFrame, getExportCaptureScale());

      await sleep(60);

      return {
        firstNode: firstPageWrapper,
        simulationCanvases,
        cleanup: () => wrappers.forEach((wrapper) => wrapper.remove())
      };
    }

    function generateAssessmentRow(title, data) {
      const hasAny = !!(data && (data.score || data.total || data.updatedAt));
      const scoreDisplay = hasAny ? `${data.score || "0"} / ${data.total || "0"}` : "Not recorded";
      const updatedDisplay = data?.updatedAt ? (formatTimestamp(data.updatedAt) || data.updatedAt) : "Not available";

      return `
        <tr>
          <td class="report-cell-strong">${escapeHTML(title)}</td>
          <td>${escapeHTML(scoreDisplay)}</td>
          <td class="report-cell-muted">${escapeHTML(updatedDisplay)}</td>
        </tr>
      `;
    }

    function escapeHTML(s) {
      return String(s || "").replace(/[&<>"']/g, (c) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[c]));
    }

    // Buttons
    
    const downloadBtn = document.getElementById("downloadBtn");

    
    downloadBtn?.addEventListener("click", downloadReportCanvas);

    window.addEventListener("beforeprint", () => {
      expandSimulationFrameForPrint();
    });
    window.addEventListener("afterprint", () => {
      clearSimulationPrintSnapshot();
      restoreSimulationFrameAfterPrint();
    });

    // Legacy export (kept for reference)
    async function downloadReport() {
      if (!contentEl) {
        showReportAlert("Report is not ready yet. Please reload and try again.", "Download Failed");
        return;
      }

      const jsPDF = window.jspdf?.jsPDF;
      if (typeof jsPDF !== "function") {
        showReportAlert("PDF library missing or blocked. Use the Print button instead.", "Download Failed");
        return;
      }

      const btn = downloadBtn;
      const originalLabel = btn?.textContent;
      if (btn) {
        btn.disabled = true;
        btn.textContent = "Preparing PDF...";
      }

      try {
        const pdf = new jsPDF({ unit: "pt", format: "a4", orientation: "portrait" });
        await pdf.html(contentEl, {
          x: 18,
          y: 18,
          html2canvas: {
            scale: Math.min(2, window.devicePixelRatio || 1.5),
            useCORS: true,
            allowTaint: true
          },
          callback(doc) {
            doc.save("progress-report.pdf");
          }
        });
      } catch (error) {
        console.error("Progress report PDF export failed", error);
        showReportAlert("Unable to create the PDF. Please try again or use Print.", "Download Failed");
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.textContent = originalLabel;
        }
      }
    }

    // More reliable export using html2canvas snapshot (multi-page)
    async function downloadReportCanvas() {
      if (!reportContainer || !contentEl) {
        showReportAlert("Report is not ready yet. Please reload and try again.", "Download Failed");
        return;
      }

      const jsPDF = window.jspdf?.jsPDF;
      if (typeof jsPDF !== "function") {
        showReportAlert("PDF library missing or blocked. Use the Print button instead.", "Download Failed");
        return;
      }

      if (typeof html2canvas !== "function") {
        showReportAlert("Snapshot library missing. Reload the page and try again.", "Download Failed");
        return;
      }

      if (document.fonts && typeof document.fonts.ready?.then === "function") {
        try { await document.fonts.ready; } catch {}
      }

      const btn = downloadBtn;
      const originalLabel = btn?.textContent;

      let exportCleanup = null;

      try {
        if (btn) {
          btn.disabled = true;
          btn.textContent = "Preparing PDF...";
        }

        const latestSimReport = getSimulationReportData();
        if (latestSimReport) currentSimulationReport = latestSimReport;

        const captureScale = getExportCaptureScale();
        const captureOptions = {
          scale: captureScale,
          useCORS: true,
          allowTaint: true,
          scrollX: 0,
          scrollY: 0,
          backgroundColor: "#ffffff"
        };

        const exportContext = await prepareExportNodes();
        if (!exportContext?.firstNode) {
          throw new Error("Report export context is unavailable.");
        }
        exportCleanup = exportContext.cleanup;

        const firstCanvas = await html2canvas(exportContext.firstNode, captureOptions);
        const simulationCanvases = Array.isArray(exportContext.simulationCanvases)
          ? exportContext.simulationCanvases.filter(Boolean)
          : [];

        const pdf = new jsPDF({ unit: "pt", format: "a4", orientation: "portrait" });
        addCanvasFittedSinglePage(pdf, firstCanvas, 24);

        for (const simulationCanvas of simulationCanvases) {
          pdf.addPage();
          addCanvasFittedSinglePage(pdf, simulationCanvas, 24);
        }

        pdf.save("progress-report.pdf");
      } catch (error) {
        console.error("Progress report PDF export failed", error);
        showReportAlert("Unable to create the PDF. Please try again or use Print.", "Download Failed");
      } finally {
        if (exportCleanup) exportCleanup();
        if (btn) {
          btn.disabled = false;
          if (typeof originalLabel === "string") btn.textContent = originalLabel;
        }
      }
    }

    reportLockedCTA?.addEventListener("click", () => redirectToUserInputForm("progressreport.html"));

    window.addEventListener("resize", scheduleEmbeddedHeightSync);
    window.addEventListener("load", scheduleEmbeddedHeightSync);
    window.addEventListener("message", (event) => {
      const allowedOrigin = window.location.origin;
      const fromNullOrigin = event.origin === "null";
      if (allowedOrigin !== "null" && event.origin !== allowedOrigin && !fromNullOrigin) return;

      const data = event.data;
      if (!data || !data.type) return;

      if (data.type === "vlab:simulation_report_generated") {
        const latestSimulationReport = getSimulationReportData();
        if (latestSimulationReport?.html) {
          currentSimulationReport = latestSimulationReport;
          renderSimulationReport(latestSimulationReport);
        }
        scheduleEmbeddedHeightSync();
        return;
      }

      if (data.type === "vlab:progress_report_height_request") {
        scheduleEmbeddedHeightSync();
      }
    });

    scheduleEmbeddedHeightSync();
  })();
  </script>

  <script>
    (function initHeaderNav() {
      const toggle = document.getElementById("mobile-menu-toggle");
      const nav = document.querySelector(".top-nav");
      if (!toggle || !nav) return;
      toggle.addEventListener("click", () => nav.classList.toggle("hidden"));
    })();
  </script>
</body>
</html>
